<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>RunicMagic</title>
    <link href="css/site.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet" />
</head>
<body>
    <div id="canvas-container">
        <svg id="world-canvas"></svg>
    </div>
    <div id="toolbar">
        <button id="btn-pick-caster">Pick Caster</button>
        <button id="btn-move-caster">Move Caster</button>
        <button id="btn-point-at">Point At</button>
    </div>
    <div id="divider"></div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
